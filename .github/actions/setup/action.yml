runs:
  using: "composite"
  steps:
    - name: Install bun
      uses: oven-sh/setup-bun@v2
    - name: Install dependencies
      run: bun install
      shell: bash
    - name: Setup Database
      run: bunx --bun prisma migrate deploy && bunx --bun prisma generate
      shell: bash
      env:
        DATABASE_URL: file:${{ runner.temp }}/ci.db
