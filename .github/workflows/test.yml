name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
jobs:
  test:
    name: build-app
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        # Set health checks to wait until redis has started
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run tests
        run: bun test
        env:
          DATABASE_URL: file:${{ runner.temp }}/ci.db
          PORT: 3000
          LOG_FOLDER: ${{ runner.temp }}/logs
          BETTER_AUTH_SECRET: ci-secret
          BETTER_AUTH_URL: "http://localhost:3000"
